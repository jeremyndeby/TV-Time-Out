<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Time Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1a2e;
      --surface:     #16213e;
      --accent:      #f5c518;
      --accent-dark: #e6b800;
      --text:        #ffffff;
      --text-muted:  #8892a4;
      --success:     #2ecc71;
      --error:       #e74c3c;
      --border:      #2a2a4a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: var(--text);
      width: 320px;
      min-height: 180px;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f5c518;
    }
    .header .badge {
      background: #6b2d8b;
      color: #ffffff;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Status bar */
    #status-bar {
      font-size: 0.8rem;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 14px;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(107, 79, 187, 0.25);
      border: 1px solid rgba(107, 79, 187, 0.4);
      color: #c8c8d8;
    }
    #status-bar.success { color: var(--success); border-color: #1a5c3a; background: #0d2f1f; }
    #status-bar.error   { color: var(--error);   border-color: #5c1a1a; background: #2f0d0d; }
    #status-bar.running { color: var(--text-muted); }

    /* Progress */
    #progress-wrap {
      display: none;
      margin-bottom: 14px;
    }
    #progress-wrap.visible { display: block; }
    .progress-bar-bg {
      background: var(--surface);
      border-radius: 999px;
      height: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #progress-bar {
      background: var(--accent);
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    #progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Button */
    #btn-export {
      width: 100%;
      padding: 12px 32px;
      background: var(--accent);
      color: #000000;
      border: none;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    #btn-export:hover:not(:disabled)  { background: var(--accent-dark); }
    #btn-export:active:not(:disabled) { transform: scale(0.98); }
    #btn-export:disabled              { opacity: 0.45; cursor: not-allowed; }

    /* Divider + footer */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0 12px;
    }
    .footer {
      font-size: 0.67rem;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.6;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid rgba(245,197,24,0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <img src="icons/logo.png" alt="TV Time Out logo" />
    <h1>TV TIME OUT</h1>
    <span class="badge">Beta</span>
  </div>

  <div id="status-bar">
    <span id="status-text">Open app.tvtime.com to get started.</span>
  </div>

  <div id="progress-wrap">
    <div class="progress-bar-bg">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-info">
      <span id="elapsed-time">0s elapsed</span>
      <span id="fetch-count">Fetching…</span>
    </div>
  </div>

  <button id="btn-export">Export my data</button>

  <div class="divider"></div>
  <div class="footer">100% client-side &mdash; no data leaves your browser</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
